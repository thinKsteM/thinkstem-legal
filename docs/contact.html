<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>thinKsteM お問い合わせ</title>
  <meta name="description" content="thinKsteMが提供するアプリへのお問い合わせ窓口" />
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --subtext: #6b7280;
      --border: #dbe3ef;
      --accent: #1d4ed8;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
        "Hiragino Kaku Gothic ProN", "Yu Gothic UI", "Noto Sans JP", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef3ff 0%, var(--bg) 45%);
    }

    main {
      max-width: 760px;
      margin: 48px auto;
      padding: 0 20px;
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.8rem;
      margin: 0 0 8px;
    }

    .lead {
      margin: 0;
      color: var(--subtext);
      line-height: 1.6;
    }

    .form-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 20px;
    }

    .form-frame {
      width: 100%;
      min-height: 720px;
      border: 0;
      border-radius: 8px;
    }

    .fallback {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 24px;
    }

    .fallback h2 {
      margin: 0 0 8px;
      font-size: 1.1rem;
    }

    .fallback p {
      margin: 4px 0;
      color: var(--subtext);
      line-height: 1.7;
    }

    a {
      color: var(--accent);
      text-decoration: none;
    }

    a:hover {
      text-decoration: underline;
    }

    .back-link {
      display: inline-block;
      margin-top: 24px;
      font-size: 0.95rem;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>お問い合わせ</h1>
      <p class="lead">
        thinKsteMが提供するアプリに関するご意見・ご要望・不具合のご連絡は、以下のフォームよりお寄せください。
      </p>
    </section>

    <section class="form-card">
      <!-- TODO: Googleフォーム作成後、下記iframeのsrcを差し替える -->
      <iframe
        class="form-frame"
        src="about:blank"
        title="thinKsteM お問い合わせフォーム"
        loading="lazy">
        読み込み中...
      </iframe>
    </section>

    <section class="fallback">
      <h2>フォームをご利用いただけない場合</h2>
      <p>
        メールでのお問い合わせも承っております。<br />
        宛先: <a href="mailto:thinkstem.apps@gmail.com">thinkstem.apps@gmail.com</a>
      </p>
      <p>
        お問い合わせ前に、各アプリの<a href="./index.html">プライバシーポリシー</a>もあわせてご確認ください。
      </p>
    </section>

    <a class="back-link" href="./index.html">← トップに戻る</a>
  </main>
</body>
</html>
