<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>thinKsteMのプライバシーポリシー</title>
  <style>
    :root {
      --bg: #f5f7fb;
      --card: #ffffff;
      --text: #1f2937;
      --subtext: #6b7280;
      --border: #dbe3ef;
      --accent: #1d4ed8;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: linear-gradient(180deg, #eef3ff 0%, var(--bg) 45%);
    }

    main {
      max-width: 760px;
      margin: 48px auto;
      padding: 0 20px;
    }

    .hero {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 24px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 1.8rem;
      margin: 0 0 8px;
    }

    .lead {
      margin: 0;
      color: var(--subtext);
      line-height: 1.6;
    }

    .policy-list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: grid;
      gap: 12px;
    }

    .policy-link {
      display: block;
      text-decoration: none;
      color: inherit;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 16px 18px;
      transition: border-color 0.2s ease, transform 0.2s ease;
    }

    .policy-link:hover {
      border-color: var(--accent);
      transform: translateY(-1px);
    }

    .policy-title {
      font-weight: 600;
      margin: 0 0 4px;
    }

    .policy-path {
      margin: 0;
      color: var(--subtext);
      font-size: 0.92rem;
    }
  </style>
</head>
<body>
  <main>
    <section class="hero">
      <h1>thinKsteMのプライバシーポリシー</h1>
      <p class="lead">
        このページでは、thinKsteMが提供するアプリのプライバシーポリシーを公開しています。
      </p>
    </section>

    <ul class="policy-list">
      <li>
        <a class="policy-link" href="./shoppinglistre/privacy-policy.html">
          <p class="policy-title">買い物リストRe</p>
          <p class="policy-path">/shoppinglistre/privacy-policy.html</p>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
